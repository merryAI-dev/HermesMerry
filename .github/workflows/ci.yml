name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Install test tooling
        run: python -m pip install --require-hashes -r requirements-dev.lock

      - name: Install package
        run: python -m pip install --no-deps --no-build-isolation -e .

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.0"

      - name: Install audit tooling
        run: python3 -m pip install --require-hashes -r requirements-audit.lock

      - name: Audit locked Python dependencies
        run: python3 -m pip_audit -r requirements.lock

      - name: Run verification
        run: make verify
